# Render Blueprint for the CourtIQ API (FastAPI).
# The frontend deploys separately on Vercel; the DB is Neon Postgres.
services:
  - type: web
    name: courtiq-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn courtiq.api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # The API only reads the board from Neon — it does not call the Odds API
      # (the GitHub Actions pipeline does that and writes to the same DB).
      - key: DATABASE_URL        # Neon Postgres URL (paste the raw Neon string)
        sync: false
      - key: FRONTEND_ORIGIN     # optional; *.vercel.app is already allowed
        sync: false
      - key: SEASON
        value: "2026"
